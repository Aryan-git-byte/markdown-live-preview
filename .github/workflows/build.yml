name: Build and Release .deb

on:
  push:
    branches: [ "main" ]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxcursor-dev libxinerama-dev libxrandr-dev libxi-dev libgl1-mesa-dev libxkbcommon-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build .deb
        run: cargo deb

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: target/debian/*.deb
          body: "markdown-live-preview release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
